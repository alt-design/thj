title: Journal
tabs:
  main:
    display: Main
    sections:
      - fields:
          - handle: title
            field:
              type: text
              display: Title
              validate: [required]
          - handle: date
            field:
              type: date
              display: Date
          - handle: feature_image
            field:
              type: assets
              display: 'Feature image'
              max_files: 1
              container: assets
          - handle: excerpt
            field:
              type: textarea
              display: Excerpt
