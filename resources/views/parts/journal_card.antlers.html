<article class="group w-[358px] shrink-0 snap-start">
    <div class="aspect-[358/514] overflow-hidden bg-cream">
        {{ feature_image }}<img src="{{ url }}" alt="{{ title }}" class="h-full w-full object-cover transition-transform duration-[650ms] ease-[cubic-bezier(0.65,0,0.35,1)] group-hover:scale-105">{{ /feature_image }}
    </div>
    <p class="mt-4 text-[11px] font-medium uppercase tracking-wide text-ink/50">{{ date format="d.m.y" }}</p>
    <h3 class="mt-2 text-[16px] font-bold uppercase leading-tight">{{ title }}</h3>
</article>
