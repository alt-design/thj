<article class="group w-[358px] shrink-0 snap-start cursor-pointer">
    <div class="aspect-[358/514] overflow-hidden bg-cream">
        {{ feature_image }}<img src="{{ url }}" alt="{{ title }}" class="h-full w-full transform-gpu object-cover transition-transform duration-[650ms] ease-[cubic-bezier(0.65,0,0.35,1)] group-hover:scale-105">{{ /feature_image }}
    </div>
    <p class="mt-4 text-[12px] font-bold uppercase text-ink/40">{{ date format="d.m.y" }}</p>
    <h3 class="mt-2 text-[20px] font-bold uppercase leading-normal">{{ title }}</h3>
</article>
