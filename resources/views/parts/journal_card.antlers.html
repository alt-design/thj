<article class="w-[358px] shrink-0 snap-start">
    <div class="aspect-[358/514] overflow-hidden bg-cream">
        {{ feature_image }}<img src="{{ url }}" alt="{{ title }}" class="h-full w-full object-cover">{{ /feature_image }}
    </div>
    <p class="mt-4 text-[11px] uppercase tracking-wide text-ink/50">{{ date format="d.m.y" }}</p>
    <h3 class="mt-2 text-[16px] font-black uppercase leading-tight">{{ title }}</h3>
</article>
