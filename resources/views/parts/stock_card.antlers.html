<article class="w-[500px] shrink-0 snap-start">
    <div class="aspect-[583/515] overflow-hidden bg-cream">
        {{ feature_image }}<img src="{{ url }}" alt="{{ title }}" class="h-full w-full object-cover">{{ /feature_image }}
    </div>
    <h3 class="mt-5 text-[18px] font-black uppercase leading-tight">{{ title }}</h3>
    <p class="mt-2 max-w-[90%] text-[12px] leading-snug text-ink/60">{{ excerpt }}</p>
    <p class="mt-3 text-[14px] font-medium">{{ price }}</p>
</article>
