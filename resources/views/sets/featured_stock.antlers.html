<section class="grid grid-cols-1 md:grid-cols-[1fr_635px]">
    {{ entries limit="1" }}
        <div class="group aspect-[960/640] overflow-hidden">
            {{ feature_image }}<img src="{{ url }}" alt="{{ title }}" class="h-full w-full transform-gpu object-cover transition-transform duration-[650ms] ease-[cubic-bezier(0.65,0,0.35,1)] group-hover:scale-[1.02]">{{ /feature_image }}
        </div>
        <div class="flex flex-col justify-between bg-panel p-pad text-paper">
            <div class="w-4/5">
                <p class="text-[11px] font-medium uppercase tracking-[0.15em] text-paper/60">Previously sold</p>
                <h2 class="mt-5 text-[24px] font-black uppercase leading-tight">{{ title }}</h2>
                <p class="mt-5 text-[14px] leading-relaxed text-paper/70">{{ excerpt }}</p>
            </div>

            <div class="mt-10 flex items-end justify-between">
                <a href="{{ url }}" class="inline-block border-b border-paper pb-1 text-[14px] font-black uppercase tracking-wide">View</a>
                <span class="flex items-center gap-2">
                    <span aria-hidden="true" class="text-lg leading-none">&larr;</span>
                    <span aria-hidden="true" class="text-lg leading-none">&rarr;</span>
                </span>
            </div>
        </div>
    {{ /entries }}
</section>
