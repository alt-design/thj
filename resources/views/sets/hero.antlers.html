<section data-hero class="relative">
    <div data-hero-stage class="relative h-screen overflow-hidden">
        <video
            class="absolute inset-0 h-full w-full object-cover"
            autoplay
            muted
            loop
            playsinline
        >
            <source src="/video/hero.mp4" type="video/mp4">
        </video>

        {{# Dark overlay over the video #}}
        <div class="absolute inset-0 bg-black/55"></div>
        <div class="absolute inset-x-0 bottom-0 h-1/2 bg-gradient-to-t from-black/40 to-transparent"></div>

        {{# Travelling shield: centred on load, then scroll-driven up into the header #}}
        <div
            data-hero-logo
            class="absolute left-1/2 top-1/2 z-30 h-[40vh] w-auto opacity-0 [&_path]:fill-paper"
        >
            {{ svg src="shield" class="block h-full w-auto" }}
        </div>

        {{# Headings hidden this phase; revealed near the end as a placeholder for the next phase #}}
        <h1
            data-hero-headings
            class="absolute inset-x-0 bottom-[12%] z-20 text-center font-normal uppercase text-paper px-4 opacity-0"
        >
            <span class="block text-[24px] leading-[30px] md:text-[34px] md:leading-[43px]">{{ heading_one }}</span>
            <span class="block text-[32px] leading-[40px] md:text-[47px] md:leading-[56px]">{{ heading_two }}</span>
        </h1>
    </div>
</section>
