<section class="relative overflow-hidden py-20 md:py-32 text-paper">
    {{ background }}<img src="{{ url }}" alt="" class="absolute inset-0 h-full w-full object-cover blur-md">{{ /background }}
    <div class="absolute inset-0 bg-ink/70"></div>

    <div class="relative z-10 mx-auto max-w-3xl px-6" data-carousel="testimonials">
        <div class="grid">
            {{ entries }}
                <div class="[grid-area:1/1]" data-testimonial-slide style="opacity: {{ if first }}1{{ else }}0{{ /if }}">
                    <span class="block h-16 font-black leading-none text-paper/80 text-[120px]" aria-hidden="true">&ldquo;</span>
                    <blockquote class="text-[20px] md:text-[26px] font-medium leading-relaxed">{{ quote }}</blockquote>
                    <p class="mt-8 text-[14px] font-bold">{{ author_name }}</p>
                    <p class="text-[13px] text-paper/70">{{ author_role }}</p>
                </div>
            {{ /entries }}
        </div>
        <div class="mt-12 flex justify-center gap-6">
            <button type="button" class="text-lg leading-none" aria-label="Previous testimonial" data-testimonial-prev>
                <span aria-hidden="true">&larr;</span>
            </button>
            <button type="button" class="text-lg leading-none" aria-label="Next testimonial" data-testimonial-next>
                <span aria-hidden="true">&rarr;</span>
            </button>
        </div>
    </div>
</section>
